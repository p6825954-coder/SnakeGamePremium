name: Build Release APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app/release.keystore -storepass android -alias snakegame -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=SnakeGame,O=Premium,C=US" 2>/dev/null
      - name: Build Release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: snake-premium-release
          path: app/build/outputs/apk/release/*.apk
